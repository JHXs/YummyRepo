name: Update RPM Repo

on:
  schedule: 
    - cron: "0 0 * * *"  # 每天 UTC 00:00（北京时间 08:00）触发
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    environment: ops3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c jq curl
          # 安装 rclone
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [s3]
          type = s3
          provider = Other
          env_auth = false
          access_key_id = ${{ secrets.AWS_KEY }}
          secret_access_key = ${{ secrets.AWS_SECRET }}
          endpoint = ${{ secrets.BASE_URL }}
          acl = private
          EOF

      - name: Restore existing RPMs
        run: |
          mkdir -p packages
          rclone sync s3:${{ secrets.BUCKET_NAME }} packages \
            --transfers 4 \
            --checkers 8
          ls -l packages

      - name: Fetch RPMs
        id: fetch
        run: |
          bash scripts/fetch.sh

      - name: Generate metadata
        if: env.UPDATED == '1'
        run: |
          createrepo_c --update packages

      - name: Sync files with rclone
        if: env.UPDATED == '1'
        run: |
          rclone sync packages s3:${{ secrets.BUCKET_NAME }} \
            --delete-during \
            --progress \
            --transfers 4 \
            --checkers 8

      - name: Commit state
        if: env.UPDATED == '1'
        run: |
          git config user.name "bot"
          git config user.email "bot@github"
          git add state/
          git commit -m "Update state files" || true
          git push