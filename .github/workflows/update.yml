name: Update RPM Repo

on:
  schedule: 
    - cron: "0 */6 * * *"  # 每6小时运行
  workflow_dispatch:

jobs:
  build:
    environment: ops3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c jq curl
      #     # 安装 rclone
      #     curl https://rclone.org/install.sh | sudo bash

      # - name: Configure rclone
      #   run: |
      #     mkdir -p ~/.config/rclone
      #     cat > ~/.config/rclone/rclone.conf << EOF
      #     [s3]
      #     type = s3
      #     provider = Other
      #     env_auth = false
      #     access_key_id = ${{ secrets.AWS_KEY }}
      #     secret_access_key = ${{ secrets.AWS_SECRET }}
      #     endpoint = https://s3.hi168.com
      #     acl = private
      #     EOF

      - name: Fetch RPMs
        run: |
          bash scripts/fetch.sh

      - name: Generate metadata
        run: |
          createrepo_c --update packages

      # - name: Upload to S3
      #   run: |
      #     rclone sync packages s3:${{ vars.BUCKET_NAME }}/packages --stats 1m

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET }}
        run: |
          aws s3 sync packages s3://${{ secrets.BUCKET_NAME }}/ --delete --endpoint-url ${{ secrets.BASE_URL }}
#          aws s3 sync packages/repodata s3://${{ secrets.BUCKET_NAME }}/repodata --delete --endpoint-url ${{ secrets.BASE_URL }}