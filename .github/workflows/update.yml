name: Update RPM Repo

on:
  schedule: 
    - cron: "0 */6 * * *"  # 每6小时运行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c jq curl awscli

      - name: Fetch RPMs
        run: |
          bash scripts/fetch.sh

      - name: Generate metadata
        run: |
          createrepo_c --update packages

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET }}
        run: |
          aws s3 sync packages s3://s3.hi168.com/${{ variables.BUCKET_NAME }}/packages --delete
          aws s3 sync packages/repodata s3://s3.hi168.com/${{ variables.BUCKET_NAME }}/repodata --delete